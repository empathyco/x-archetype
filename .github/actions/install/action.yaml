name: Build project
description: Install dependencies, build and test project

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .nvmrc
        cache: npm
    - name: Installing dependencies
      run: npm ci
      shell: bash
    - name: Run typecheck
      run: npm run typecheck
      shell: bash
    - name: Check linter
      run: npm run lint:check
      shell: bash
    - name: Check format
      run: npm run format:check
      shell: bash
    - name: Build project
      run: npm run build
      shell: bash
    - name: Running tests
      run: npm test
      shell: bash
