name: PR Validate & Preview
on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: [self-hosted, linux, x64, vm, docker, big, frontend]
    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Installing dependencies
        run: npm ci
        shell: bash
      - name: Build project
        run: npm run build
        shell: bash
      - name: Deploy PR Preview
        uses: ./.github/actions/frontend-deploy
        with:
          r2_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_STAGING_ACCOUNT_KEY }}
          r2_secret_access_key: ${{ secrets.R2_STAGING_ACCESS_SECRET }}
          r2_bucket: ${{ secrets.R2_STAGING_BUCKET }}
          r2_bucket_path: preview/${{ github.event.number }}
          r2_zone_id: ${{ secrets.CLOUDFLARE_STAGING_ZONE_ID }}
          r2_api_token: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
          r2_purge_strategy: |
            {
              "files": [
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/app.js",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/snippet-script.js",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/index.html",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/instances.html",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/instances.json"
              ]
            }
          delete_old_files: true
      - name: Adding comment to PR with preview link and validation results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Check **PR ${{ github.event.number }}** preview 👀 <br> <br> \
                    [https://x.staging.empathy.co/preview/${{ github.event.number }}/index.html](https://x.staging.empathy.co/preview/${{ github.event.number }}/index.html)`
            })
