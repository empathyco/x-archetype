name: PR Validate & Preview
on:
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  ci-pr:
    uses: empathyco/platform-reusable-github-actions/.github/workflows/frontend-ci-pr.yml@main # main
    secrets: inherit
    with:
      runner: "['self-hosted', 'linux', 'x64', 'vm', 'docker', 'big', 'frontend']"
      build-script: ''
  deploy:
    runs-on: ubuntu-latest
    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Installing dependencies
        run: npm ci
        shell: bash
      - name: Build project
        run: npm run build
        shell: bash
      - name: Deploy project on Cloudflare R2
        uses: ./.github/actions/cloudflare-r2
        id: cloudflare
        with:
          r2_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2_access_key_id: ${{ secrets.R2_STAGING_ACCOUNT_KEY }}
          r2_secret_access_key: ${{ secrets.R2_STAGING_ACCESS_SECRET }}
          r2_bucket: ${{ secrets.R2_STAGING_BUCKET }}
          r2_bucket_path: preview/${{ github.event.number }}
          r2_zone_id: ${{ secrets.CLOUDFLARE_STAGING_ZONE_ID }}
          r2_api_token: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
          r2_purge_strategy: |
            {
              "files": [
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/app.js",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/snippet-script.js",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/index.html",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/instances.html",
                "https://x.staging.empathy.co/preview/${{ github.event.number }}/instances.json"
              ]
            }
          delete_old_files: true
      # - name: Get current date
      #   id: date
      #   run: echo "current=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      #- name: Leave a comment after deployment
