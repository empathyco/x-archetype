name: PR Validate & Preview
on:
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  pr-preview:
    if: false
    uses: empathyco/platform-reusable-github-actions/.github/workflows/x-archetype-pr-preview.yml@bb77254a21ec4b044e311f546e183adbe24e3ec4 # main
    secrets: inherit
